<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #0a120c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #e5e5e5;
      padding: clamp(24px, 4vw, 50px);
    }
    .content {
      width: 100%;
      max-width: 1250px;
      text-align: center;
    }
    .badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.2vw, 18px);
      color: #22c55e;
      font-size: clamp(10px, 1vw, 15px);
      letter-spacing: 2px;
      margin-bottom: clamp(12px, 2vh, 22px);
    }
    .badge::before, .badge::after {
      content: '';
      width: clamp(24px, 2.6vw, 44px);
      height: 2px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    }
    .title {
      font-size: clamp(24px, 3vw, 46px);
      color: #22c55e;
      margin-bottom: clamp(20px, 3.2vh, 36px);
      text-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
    }
    .shots {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 1.5vw, 24px);
      margin-bottom: clamp(20px, 3.2vh, 36px);
    }
    .shot {
      max-height: 46vh;
      max-width: 22%;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
    }
    .facts {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 1.5vw, 24px);
      flex-wrap: wrap;
    }
    .fact {
      background: rgba(13, 13, 13, 0.9);
      border: 1px solid #1a2a1f;
      border-radius: 999px;
      padding: clamp(8px, 1vw, 14px) clamp(16px, 2vw, 28px);
      font-size: clamp(11px, 1.1vw, 17px);
      color: #d1d5db;
    }
    .fact strong { color: #22c55e; }
    @media (max-width: 800px) {
      .shots .shot:nth-child(n+3) { display: none; }
      .shot { max-width: 45%; }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="badge">WHERE IT STANDS</div>
    <div class="title">Playable Today</div>
    <div class="shots">
      <img src="/screenshots/01-home.png" class="shot" alt="Home">
      <img src="/screenshots/02-toll.png" class="shot" alt="The Toll">
      <img src="/screenshots/04-death.png" class="shot" alt="Death">
      <img src="/screenshots/06-ranks.png" class="shot" alt="Ranks">
    </div>
    <div class="facts">
      <div class="fact"><strong>Live on web</strong> — play.dieforward.com</div>
      <div class="fact"><strong>Android build</strong> shipping today</div>
      <div class="fact"><strong>Ready to publish</strong> on Solana Seeker</div>
      <div class="fact"><strong>7 languages</strong></div>
      <div class="fact"><strong>On-chain</strong> on devnet</div>
    </div>
  </div>
</body>
</html>
