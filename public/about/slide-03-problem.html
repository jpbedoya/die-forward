<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0808 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #e5e5e5;
      padding: clamp(30px, 5vw, 60px);
      position: relative;
      overflow: hidden;
    }
    .bg-texture {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: url('bg-crypt.webp') center/cover;
      opacity: 0.1; z-index: 0;
    }
    .content {
      max-width: 1200px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.2vw, 18px);
      color: #ef4444;
      font-size: clamp(10px, 1vw, 15px);
      letter-spacing: 2px;
      margin-bottom: clamp(20px, 4vh, 40px);
    }
    .badge::before, .badge::after {
      content: '';
      width: clamp(24px, 2.6vw, 44px);
      height: 2px;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
    }
    .problem {
      font-size: clamp(18px, 2.2vw, 36px);
      color: #6b7280;
      margin-bottom: clamp(30px, 5vh, 50px);
      line-height: 1.6;
    }
    .strike {
      text-decoration: line-through;
      text-decoration-color: rgba(239, 68, 68, 0.85);
      text-decoration-thickness: 3px;
      color: #52525b;
    }
    .solution-label {
      font-size: clamp(14px, 1.4vw, 24px);
      color: #6b7280;
      letter-spacing: 4px;
      margin-bottom: clamp(15px, 2vh, 25px);
    }
    .solution {
      font-size: clamp(34px, 4.4vw, 72px);
      color: #f59e0b;
      font-weight: bold;
      text-shadow: 0 0 50px rgba(245, 158, 11, 0.45);
      margin-bottom: clamp(24px, 4.5vh, 46px);
    }
    .details {
      display: flex;
      align-items: stretch;
      padding: clamp(14px, 2vh, 26px) 0;
      border-top: 1px solid #2a2a2e;
      border-bottom: 1px solid #2a2a2e;
    }
    .detail-item {
      flex: 1;
      text-align: center;
      padding: 0 clamp(10px, 1.4vw, 22px);
    }
    .detail-item + .detail-item {
      border-left: 1px solid #2a2a2e;
    }
    .detail-icon {
      font-size: clamp(32px, 4vw, 56px);
      margin-bottom: clamp(8px, 1vh, 15px);
    }
    .detail-icon-img {
      width: clamp(90px, 10vw, 140px);
      height: clamp(90px, 10vw, 140px);
      object-fit: cover;
      margin-bottom: clamp(8px, 1vh, 15px);
      /* No border/frame — fade the art into the background and let a faint
         glow lift it off the page instead. */
      -webkit-mask-image: linear-gradient(to right, transparent, #000 18%, #000 82%, transparent), linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
      -webkit-mask-composite: source-in;
      mask-image: linear-gradient(to right, transparent, #000 18%, #000 82%, transparent), linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
      mask-composite: intersect;
      filter: drop-shadow(0 0 26px rgba(245, 158, 11, 0.22));
    }
    .detail-text {
      font-size: clamp(14px, 1.4vw, 22px);
      color: #a1a1aa;
    }
    .detail-sub {
      font-size: clamp(10px, 1vw, 16px);
      color: #6b7280;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="badge">THE PROBLEM</div>
    <div class="problem">
      Web3 gaming became <span class="strike">GameFi</span>:<br>
      grinding, farming, yield speculation disguised as games.
    </div>
    <div class="solution-label">DIE FORWARD IS DIFFERENT</div>
    <div class="solution">Entertainment first.</div>
    <div class="details">
      <div class="detail-item">
        <img src="icon-fun-256.webp" class="detail-icon-img" alt="">
        <div class="detail-text">Play because it's fun</div>
        <div class="detail-sub">Not to farm rewards</div>
      </div>
      <div class="detail-item">
        <img src="icon-tension-256.webp" class="detail-icon-img" alt="">
        <div class="detail-text">Stakes add tension</div>
        <div class="detail-sub">Not yield mechanics</div>
      </div>
      <div class="detail-item">
        <img src="icon-permanent-256.webp" class="detail-icon-img" alt="">
        <div class="detail-text">Deaths are permanent</div>
        <div class="detail-sub">On-chain, discoverable</div>
      </div>
    </div>
  </div>
</body>
</html>
