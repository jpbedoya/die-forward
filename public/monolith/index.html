<!DOCTYPE html>
<html>
<head>
  <title>Die Forward — Graveyard Hackathon Pitch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="app-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    .slide-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 100px 20px;
    }
    iframe {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 120px);
      border: none;
      background: #0a0a0a;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 100;
      background: rgba(0,0,0,0.9);
      padding: 12px 25px;
      border-radius: 50px;
      border: 1px solid #333;
    }
    button {
      background: #1a1a1a;
      color: #f5f5f5;
      border: 1px solid #333;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: 'Courier New', monospace;
    }
    button:hover {
      background: #2a2a2a;
      border-color: #f59e0b;
    }
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .counter {
      color: #71717a;
      font-size: 16px;
      display: flex;
      align-items: center;
      min-width: 60px;
      justify-content: center;
    }
    .help {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #4a4a4a;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="slide-wrapper">
    <iframe id="slide" src="slide-01-hook.html"></iframe>
  </div>
  
  <div class="controls">
    <button id="prev" onclick="prev()">← Prev</button>
    <div class="counter"><span id="num">1</span> / 15</div>
    <button id="next" onclick="next()">Next →</button>
  </div>

  <div class="help">← → arrow keys to navigate</div>

  <script>
    const slides = [
      'slide-01-hook.html',
      'slide-02-title.html',
      'slide-03-problem.html',
      'slide-04-game.html',
      'slide-05-features.html',
      'slide-community.html',
      'slide-06-agents.html',
      'slide-07-audius.html',
      'slide-08-tapestry.html',
      'slide-09-magicblock.html',
      'slide-10-escrow.html',
      'slide-11-business.html',
      'slide-12-build.html',
      'slide-13-next.html',
      'slide-14-close.html',
    ];
    
    let current = 0;
    
    function show(n) {
      current = Math.max(0, Math.min(slides.length - 1, n));
      document.getElementById('slide').src = slides[current];
      document.getElementById('num').textContent = current + 1;
      document.getElementById('prev').disabled = current === 0;
      document.getElementById('next').disabled = current === slides.length - 1;
    }
    
    function next() { show(current + 1); }
    function prev() { show(current - 1); }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });
    
    show(0);
  </script>
</body>
</html>
