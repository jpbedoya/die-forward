<!DOCTYPE html>
<html>
<head>
  <title>Die Forward Logo Preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      font-family: monospace;
      color: #888;
    }
    .preview {
      margin: 20px 0 40px;
      background: #0a0a0a;
      padding: 20px;
      border: 1px solid #333;
      display: inline-block;
    }
    h2 { color: #f59e0b; margin-top: 40px; }
    img { display: block; max-width: 100%; }
    .transparent { background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 50% / 20px 20px; }
  </style>
</head>
<body>
  <h1 style="color:#f59e0b">DIE FORWARD - Logo SVG Preview</h1>
  
  <h2>With Dark Background</h2>
  <div class="preview">
    <img src="/logo-die-forward-dark.svg" alt="Die Forward Logo (dark bg)" style="height: 72px;">
  </div>
  
  <h2>Scaled 2x</h2>
  <div class="preview">
    <img src="/logo-die-forward-dark.svg" alt="Die Forward Logo 2x" style="height: 144px;">
  </div>
  
  <h2>Scaled 4x</h2>
  <div class="preview">
    <img src="/logo-die-forward-dark.svg" alt="Die Forward Logo 4x" style="height: 288px;">
  </div>
  
  <h2>Transparent Background</h2>
  <div class="preview transparent">
    <img src="/logo-die-forward.svg" alt="Die Forward Logo (transparent)" style="height: 72px;">
  </div>
  
  <h2>Favicon (existing)</h2>
  <div class="preview">
    <img src="/favicon.svg" alt="Favicon" style="width: 64px; height: 64px;">
  </div>
  
  <p style="margin-top: 40px; color: #666;">
    Files created:<br>
    • /logo-die-forward.svg (transparent bg, amber text)<br>
    • /logo-die-forward-dark.svg (dark bg, amber text with glow)
  </p>
</body>
</html>
